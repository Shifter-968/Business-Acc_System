version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fannie_logistics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fannie
      POSTGRES_PASSWORD: fannie_dev_pass
      POSTGRES_DB: fannie_logistics
    ports:
      - "5433:5432"
    volumes:
      - fannie_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fannie_logistics_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fannielogistics.co.za
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  fannie_postgres_data:
